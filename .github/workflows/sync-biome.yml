name: Sync biome fork
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6h
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync main with upstream
        env:
          GH_TOKEN: ${{ secrets.JACOB_DEVELOPS_GH_TOKEN }}
        run: gh repo sync jacobdevelops/biome -b main
